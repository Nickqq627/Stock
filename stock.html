<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>信貸投資動態模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #00d4ff;
            --text-main: #e0e0e0;
            --accent-color: #2c2c2c;
            --input-bg: #252525;
            --border-color: #333;
            --highlight: #00ff88;
            --inflation-color: #ff9f43;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color);
            color: var(--text-main); 
            margin: 0;
            padding: 12px; 
            line-height: 1.4;
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
        }

        h1 { 
            text-align: center; 
            color: var(--text-color); 
            font-size: 1.4rem;
            margin-bottom: 20px; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            margin-bottom: 20px; 
        }

        @media (min-width: 992px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            h1 { font-size: 2rem; }
            body { padding: 30px 20px; }
            .container { padding: 30px; }
        }

        .section { 
            background: var(--accent-color); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }

        .section-title { 
            font-size: 0.9em; 
            color: var(--text-color); 
            margin-bottom: 12px; 
            font-weight: bold; 
            border-left: 3px solid var(--text-color);
            padding-left: 10px;
        }

        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.8em; color: #888; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            background: var(--input-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
        }

        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            font-size: 0.85em; 
        }
        .checkbox-group input { width: 18px; height: 18px; margin: 0; }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--text-color); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.05em; 
            font-weight: bold; 
            margin-top: 5px; 
        }

        .chart-container { 
            position: relative; 
            height: 280px; 
            width: 100%; 
            margin-top: 25px; 
        }
        @media (min-width: 768px) { .chart-container { height: 400px; } }

        /* --- 修正金額換行的核心樣式 --- */
        .summary { 
            margin-top: 20px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
        }
        @media (min-width: 768px) { .summary { grid-template-columns: repeat(4, 1fr); gap: 12px; } }

        .stat-card { 
            background: rgba(255,255,255,0.04); 
            padding: 12px 6px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden; /* 防止溢出 */
        }

        .stat-label { 
            font-size: 0.7rem; 
            color: #888; 
            margin-bottom: 4px; 
            white-space: nowrap; 
        }

        .stat-value { 
            /* 關鍵：使用 clamp 根據螢幕大小動態縮放字體，並強制不換行 */
            font-size: clamp(0.85rem, 3.5vw, 1.2rem); 
            font-weight: bold; 
            color: var(--highlight); 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; /* 如果真的太長則顯示省略號 */
        }
        
        .stat-value.red { color: #ff4b2b; }
        .stat-value.inflation { color: var(--inflation-color); }

        .info-note { margin-top: 15px; font-size: 0.7rem; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>信貸投資動態模擬器</h1>
    
    <div class="grid">
        <div class="section">
            <div class="section-title">基礎資產</div>
            <div class="input-group">
                <label>初始自有資金 (NTD)</label>
                <input type="text" id="principal" value="30,000" class="comma-input">
            </div>
            <div class="input-group">
                <label>每月投入資金 (NTD)</label>
                <input type="text" id="monthlyInvest" value="30,000" class="comma-input">
            </div>
            <div class="input-group">
                <label>年化報酬率 (%)</label>
                <input type="number" id="investRate" value="9" step="0.1">
            </div>
        </div>

        <div class="section">
            <div class="section-title">信貸與通膨</div>
            <div class="input-group">
                <label>信貸借款金額 (NTD)</label>
                <input type="text" id="loanAmount" value="1,000,000" class="comma-input">
            </div>
            <div class="input-group">
                <label>信貸年利率 (%)</label>
                <input type="number" id="loanRate" value="2.5" step="0.1">
            </div>
            <div class="input-group">
                <label>預期年通膨率 (%)</label>
                <input type="number" id="inflationRate" value="2" step="0.1">
            </div>
        </div>

        <div class="section">
            <div class="section-title">週期邏輯</div>
            <div class="input-group">
                <label>還款期限 (年)</label>
                <input type="number" id="loanYears" value="7">
            </div>
            <div class="input-group">
                <label>模擬總時長 (年)</label>
                <input type="number" id="totalYears" value="15">
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="deductFromMonthly" checked> 
                <span>從每月資金扣除還款</span>
            </label>
            <button onclick="calculate()">執行模擬</button>
        </div>
    </div>

    <div class="summary" id="statSummary"></div>

    <div class="chart-container">
        <canvas id="investChart"></canvas>
    </div>
    
    <p class="info-note">提示：長按圖表可看詳細數值。實質購買力已考慮通膨折現。</p>
</div>

<script>
let myChart;

function formatNumber(n) {
    return n.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function parseNumber(s) {
    return parseFloat(s.replace(/,/g, "")) || 0;
}

document.querySelectorAll('.comma-input').forEach(input => {
    input.addEventListener('input', function(e) {
        let cursorPosition = e.target.selectionStart;
        let originalLength = e.target.value.length;
        e.target.value = formatNumber(e.target.value);
        let newLength = e.target.value.length;
        e.target.setSelectionRange(cursorPosition + (newLength - originalLength), cursorPosition + (newLength - originalLength));
    });
});

function calculate() {
    const principal = parseNumber(document.getElementById('principal').value);
    const monthlyInvest = parseNumber(document.getElementById('monthlyInvest').value);
    const investRateYearly = parseFloat(document.getElementById('investRate').value) / 100;
    const investRateMonthly = investRateYearly / 12;
    
    const loanAmount = parseNumber(document.getElementById('loanAmount').value);
    const loanRateYearly = parseFloat(document.getElementById('loanRate').value) / 100;
    const loanRateMonthly = loanRateYearly / 12;
    const loanMonths = parseInt(document.getElementById('loanYears').value) * 12;
    
    const inflationRateYearly = parseFloat(document.getElementById('inflationRate').value) / 100;
    const totalYears = parseInt(document.getElementById('totalYears').value);
    const totalMonths = totalYears * 12;
    const deductFromMonthly = document.getElementById('deductFromMonthly').checked;

    const monthlyPayment = loanAmount * (loanRateMonthly * Math.pow(1 + loanRateMonthly, loanMonths)) / (Math.pow(1 + loanRateMonthly, loanMonths) - 1);

    let labels = [];
    let noLoanAssets = [];
    let withLoanAssets = [];

    let currentNoLoan = principal;
    let currentWithLoanTotal = principal + loanAmount;

    labels.push("起始");
    noLoanAssets.push(principal);
    withLoanAssets.push(principal);

    for (let m = 1; m <= totalMonths; m++) {
        currentNoLoan = (currentNoLoan * (1 + investRateMonthly)) + monthlyInvest;
        currentWithLoanTotal = currentWithLoanTotal * (1 + investRateMonthly);
        
        let actualInputWithLoan = monthlyInvest;
        let currentRemainingDebt = 0;

        if (m <= loanMonths) {
            if (deductFromMonthly) {
                actualInputWithLoan = Math.max(0, monthlyInvest - monthlyPayment);
            } else {
                actualInputWithLoan = monthlyInvest;
            }
            currentRemainingDebt = loanAmount * (Math.pow(1 + loanRateMonthly, loanMonths) - Math.pow(1 + loanRateMonthly, m)) / (Math.pow(1 + loanRateMonthly, loanMonths) - 1);
        } else {
            actualInputWithLoan = monthlyInvest;
            currentRemainingDebt = 0;
        }

        currentWithLoanTotal += actualInputWithLoan;

        if (m % 12 === 0 || m === totalMonths) {
            labels.push((m/12) + "Y");
            noLoanAssets.push(Math.round(currentNoLoan));
            withLoanAssets.push(Math.round(currentWithLoanTotal - currentRemainingDebt));
        }
    }

    renderUI(labels, noLoanAssets, withLoanAssets, monthlyPayment, totalYears, inflationRateYearly);
}

function renderUI(labels, noLoanData, withLoanData, pmt, totalYears, inflationRate) {
    const ctx = document.getElementById('investChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '無信貸',
                    data: noLoanData,
                    borderColor: '#777',
                    borderWidth: 1.5,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    tension: 0.3
                },
                {
                    label: '有信貸',
                    data: withLoanData,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    borderWidth: 3,
                    pointRadius: 1,
                    fill: true,
                    tension: 0.3
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { color: '#ccc', boxWidth: 10, font: { size: 10 } } }
            },
            scales: {
                y: { grid: { color: '#333' }, ticks: { color: '#888', font: { size: 9 } } },
                x: { grid: { display: false }, ticks: { color: '#888', font: { size: 9 } } }
            }
        }
    });

    const finalNoLoan = noLoanData[noLoanData.length - 1];
    const finalWithLoan = withLoanData[withLoanData.length - 1];
    const realWithLoan = finalWithLoan / Math.pow(1 + inflationRate, totalYears);
    const diff = finalWithLoan - finalNoLoan;
    
    document.getElementById('statSummary').innerHTML = `
        <div class="stat-card">
            <div class="stat-label">月還款額</div>
            <div class="stat-value red">NT$${Math.round(pmt).toLocaleString()}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">名目淨資產</div>
            <div class="stat-value">NT$${finalWithLoan.toLocaleString()}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">實質購買力</div>
            <div class="stat-value inflation">NT$${Math.round(realWithLoan).toLocaleString()}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">額外價值</div>
            <div class="stat-value" style="color:${diff >= 0 ? '#00ff88' : '#ff4b2b'}">NT$${diff.toLocaleString()}</div>
        </div>
    `;
}

calculate();
</script>

</body>
</html>
