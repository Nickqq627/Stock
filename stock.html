<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信貸投資動態模擬器 (含通膨計算)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #00d4ff;
            --text-main: #e0e0e0;
            --accent-color: #2c2c2c;
            --input-bg: #252525;
            --border-color: #333;
            --highlight: #00ff88;
            --inflation-color: #ff9f43;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--text-color); margin-bottom: 30px; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .section { background: var(--accent-color); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); }
        .section-title { font-size: 1em; color: var(--text-color); margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #888; }
        input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 5px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--text-color); }

        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 15px; font-size: 0.9em; }
        .checkbox-group input { width: auto; }

        button { width: 100%; padding: 15px; background: var(--text-color); color: #000; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .chart-container { position: relative; height: 450px; width: 100%; margin-top: 30px; }
        
        .summary { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-size: 1.3em; font-weight: bold; color: var(--highlight); margin-top: 5px; }
        .stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; }
        .stat-value.inflation { color: var(--inflation-color); }
        
        .info-note { margin-top: 15px; font-size: 0.8em; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>信貸投資動態模擬器 (含通膨影響)</h1>
    
    <div class="grid">
        <div class="section">
            <div class="section-title">基礎資產</div>
            <div class="input-group">
                <label>初始自有資金 (NTD)</label>
                <input type="number" id="principal" value="30000">
            </div>
            <div class="input-group">
                <label>每月可投入投資資金 (NTD)</label>
                <input type="number" id="monthlyInvest" value="30000">
            </div>
            <div class="input-group">
                <label>預期投資年化報酬率 (%)</label>
                <input type="number" id="investRate" value="9" step="0.1">
            </div>
        </div>

        <div class="section">
            <div class="section-title">信貸與通膨</div>
            <div class="input-group">
                <label>信貸借款金額 (NTD)</label>
                <input type="number" id="loanAmount" value="1000000">
            </div>
            <div class="input-group">
                <label>信貸年利率 (%)</label>
                <input type="number" id="loanRate" value="2.5" step="0.1">
            </div>
            <div class="input-group">
                <label>預期年化通膨率 (%)</label>
                <input type="number" id="inflationRate" value="2" step="0.1">
            </div>
        </div>

        <div class="section">
            <div class="section-title">模擬範圍與邏輯</div>
            <div class="input-group">
                <label>還款期限 (年)</label>
                <input type="number" id="loanYears" value="7">
            </div>
            <div class="input-group">
                <label>模擬總時長 (年)</label>
                <input type="number" id="totalYears" value="15">
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="deductFromMonthly" checked> 
                <span>還款期內，從每月資金扣除還款額</span>
            </label>
            <button onclick="calculate()">更新模擬數據</button>
        </div>
    </div>

    <div class="summary" id="statSummary"></div>

    <div class="chart-container">
        <canvas id="investChart"></canvas>
    </div>
    
    <p class="info-note">* 註：本模型假設信貸還清後，原還款支出將全數回流至定期定額投資中。不計開辦費。通膨淨資產為考量物價漲幅後的實質購買力。</p>
</div>

<script>
let myChart;

function calculate() {
    const principal = parseFloat(document.getElementById('principal').value);
    const monthlyInvest = parseFloat(document.getElementById('monthlyInvest').value);
    const investRateYearly = parseFloat(document.getElementById('investRate').value) / 100;
    const investRateMonthly = investRateYearly / 12;
    
    const loanAmount = parseFloat(document.getElementById('loanAmount').value);
    const loanRateYearly = parseFloat(document.getElementById('loanRate').value) / 100;
    const loanRateMonthly = loanRateYearly / 12;
    const loanMonths = parseInt(document.getElementById('loanYears').value) * 12;
    
    const inflationRateYearly = parseFloat(document.getElementById('inflationRate').value) / 100;
    const totalYears = parseInt(document.getElementById('totalYears').value);
    const totalMonths = totalYears * 12;
    const deductFromMonthly = document.getElementById('deductFromMonthly').checked;

    const monthlyPayment = loanAmount * (loanRateMonthly * Math.pow(1 + loanRateMonthly, loanMonths)) / (Math.pow(1 + loanRateMonthly, loanMonths) - 1);

    let labels = [];
    let noLoanAssets = [];
    let withLoanAssets = [];

    let currentNoLoan = principal;
    let currentWithLoanTotal = principal + loanAmount;

    labels.push("起始");
    noLoanAssets.push(principal);
    withLoanAssets.push(principal);

    for (let m = 1; m <= totalMonths; m++) {
        // 1. 無信貸方案
        currentNoLoan = (currentNoLoan * (1 + investRateMonthly)) + monthlyInvest;

        // 2. 有信貸方案
        currentWithLoanTotal = currentWithLoanTotal * (1 + investRateMonthly);
        
        let actualInputWithLoan = monthlyInvest;
        let currentRemainingDebt = 0;

        if (m <= loanMonths) {
            if (deductFromMonthly) {
                actualInputWithLoan = Math.max(0, monthlyInvest - monthlyPayment);
            } else {
                actualInputWithLoan = monthlyInvest;
            }
            currentRemainingDebt = loanAmount * (Math.pow(1 + loanRateMonthly, loanMonths) - Math.pow(1 + loanRateMonthly, m)) / (Math.pow(1 + loanRateMonthly, loanMonths) - 1);
        } else {
            actualInputWithLoan = monthlyInvest;
            currentRemainingDebt = 0;
        }

        currentWithLoanTotal += actualInputWithLoan;

        if (m % 12 === 0 || m === totalMonths) {
            labels.push("第 " + (m/12) + " 年");
            noLoanAssets.push(Math.round(currentNoLoan));
            withLoanAssets.push(Math.round(currentWithLoanTotal - currentRemainingDebt));
        }
    }

    renderUI(labels, noLoanAssets, withLoanAssets, monthlyPayment, loanMonths, inflationRateYearly, totalYears);
}

function renderUI(labels, noLoanData, withLoanData, pmt, loanMonths, inflationRate, totalYears) {
    const ctx = document.getElementById('investChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '無信貸 (純定期定額)',
                    data: noLoanData,
                    borderColor: '#666',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3
                },
                {
                    label: '有信貸 (淨資產)',
                    data: withLoanData,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#ccc' } },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                x: { grid: { display: false }, ticks: { color: '#888' } }
            }
        }
    });

    const lastIdx = noLoanData.length - 1;
    const finalNoLoan = noLoanData[lastIdx];
    const finalWithLoan = withLoanData[lastIdx];
    
    // 計算通膨折現後的實質價值 (Real Value)
    const realWithLoan = finalWithLoan / Math.pow(1 + inflationRate, totalYears);
    const diff = finalWithLoan - finalNoLoan;
    
    document.getElementById('statSummary').innerHTML = `
        <div class="stat-card">
            <div class="stat-label">每月還款金額</div>
            <div class="stat-value" style="color:#ff4b2b">NT$ ${Math.round(pmt).toLocaleString()}</div>
            <div style="font-size:10px; color:#666">還款期間 ${loanMonths} 個月</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">期末名目淨資產</div>
            <div class="stat-value">NT$ ${finalWithLoan.toLocaleString()}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">期末實質購買力 (考量通膨)</div>
            <div class="stat-value inflation">NT$ ${Math.round(realWithLoan).toLocaleString()}</div>
            <div style="font-size:10px; color:#888">折現年率 ${ (inflationRate*100).toFixed(1) }%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">信貸創造額外價值</div>
            <div class="stat-value" style="color: ${diff >= 0 ? '#00ff88' : '#ff4b2b'}">NT$ ${diff.toLocaleString()}</div>
        </div>
    `;
}

calculate();
</script>

</body>
</html>
